<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SAYCO | Secure Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: #080a0c;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        #particles-js {
            position: absolute; width: 100%; height: 100%;
            top: 0; left: 0; z-index: 1;
        }

        .main-container {
            position: relative; z-index: 2;
            height: 100vh; display: flex;
            align-items: center; justify-content: center;
        }

        .auth-card {
            background: #111418;
            border-top: 4px solid #00ffc3;
            border-radius: 10px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        h2 { color: #00ffc3; font-weight: 700; text-align: center; margin-bottom: 30px; letter-spacing: 1px; }

        .form-control {
            background: #1a1f24;
            border: 1px solid #2d353c;
            color: #fff !important;
            padding: 12px;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        /* تفاعل الخانة النشطة فقط */
        .form-control:enabled:hover {
            border-color: #00ffc3;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 255, 195, 0.3);
            background: #21282e;
        }

        .form-control:disabled {
            background: #0c0e10;
            border-color: #1a1f24;
            opacity: 0.4;
            cursor: not-allowed;
        }

        .form-control:focus {
            background: #1a1f24; border-color: #00ffc3;
            box-shadow: 0 0 8px rgba(0, 255, 195, 0.3);
            outline: none;
        }

        .pass-wrapper { position: relative; }
        .toggle-btn {
            position: absolute; left: 15px; top: 15px;
            color: #636e72; cursor: pointer; z-index: 10;
        }

        .btn-submit {
            background: #00ffc3; color: #080a0c;
            font-weight: 800; border: none; padding: 12px;
            margin-top: 10px; transition: 0.4s;
        }

        .btn-submit:enabled:hover {
            background: #00ce9d; transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 195, 0.4);
        }

        .error-hint { color: #ff4d4d; font-size: 0.8em; display: none; margin-bottom: 10px; }
        
        .register-link {
            text-align: center; margin-top: 20px; color: #636e72; font-size: 0.9em;
        }
        .register-link a { color: #00ffc3; text-decoration: none; font-weight: 600; }
        
        ::placeholder { color: #636e72 !important; }

        /* ستايل بسيط لمنطقة الكود العشوائي عشان تليق مع ديزاينك */
        #otpArea { display: none; border: 1px dashed #00ffc3; padding: 10px; border-radius: 5px; margin-bottom: 15px; text-align: center; }
        .otp-display { color: #00ffc3; font-weight: bold; font-size: 1.2em; letter-spacing: 3px; }
    </style>
</head>
<body>

<div id="particles-js"></div>

<div class="main-container">
    <div class="auth-card">
        <h2>SAYCO LOGIN</h2>
        <form id="loginForm">
            <input type="email" id="email" class="form-control" placeholder="البريد الإلكتروني" required>
            
            <div class="pass-wrapper">
                <input type="password" id="pass" class="form-control" placeholder="كلمة المرور" required disabled>
                <i class="fa-solid fa-eye-slash toggle-btn" id="togglePass"></i>
            </div>

            <div id="otpArea">
                <div style="color: #fff; font-size: 0.8em; margin-bottom: 5px;">كود التحقق: <span class="otp-display" id="generatedCode"></span></div>
                <input type="text" id="otpInput" class="form-control" placeholder="أدخل الكود الظاهر">
            </div>
            
            <div id="loginError" class="error-hint">⚠️ خطأ في البيانات أو الحساب غير موجود.</div>

            <button type="submit" id="submitBtn" class="btn btn-submit w-100" disabled>تسجيل الدخول</button>
            
            <div class="register-link">
                ليس لديك حساب؟ <a href="register.html">إنشاء حساب جديد</a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
    /* كود الأنيميشن الأصلي بتاعك بدون تعديل */
    particlesJS("particles-js", {
        "particles": {
            "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
            "color": { "value": "#00ffc3" },
            "shape": { "type": "circle" },
            "opacity": { "value": 0.5, "random": false },
            "size": { "value": 3, "random": true },
            "line_linked": { "enable": true, "distance": 150, "color": "#00ffc3", "opacity": 0.4, "width": 1 },
            "move": { "enable": true, "speed": 2, "direction": "none", "random": false, "straight": false, "out_mode": "out", "bounce": false }
        },
        "interactivity": {
            "events": { "onhover": { "enable": true, "mode": "grab" }, "onclick": { "enable": true, "mode": "push" } },
            "modes": { "grab": { "distance": 140, "line_linked": { "opacity": 1 } } }
        },
        "retina_detect": true
    });

    const emailInput = document.getElementById('email');
    const passInput = document.getElementById('pass');
    const togglePass = document.getElementById('togglePass');
    const submitBtn = document.getElementById('submitBtn');
    
    let attempts = 0;
    let randomCode = null;

    // إظهار وإخفاء الباسورد
    togglePass.addEventListener('click', () => {
        passInput.type = passInput.type === 'password' ? 'text' : 'password';
        togglePass.classList.toggle('fa-eye');
        togglePass.classList.toggle('fa-eye-slash');
    });

    // تتابع الخانات
    emailInput.addEventListener('input', () => {
        if (emailInput.value.trim().length > 5) {
            passInput.disabled = false;
        } else {
            passInput.disabled = true;
            passInput.value = "";
            submitBtn.disabled = true;
        }
        document.getElementById('loginError').style.display = 'none';
    });

    passInput.addEventListener('input', () => {
        if (passInput.value.length >= 8) {
            submitBtn.disabled = false;
        } else {
            submitBtn.disabled = true;
        }
        document.getElementById('loginError').style.display = 'none';
    });

    // منطق تسجيل الدخول المطلوب بدقة
    document.getElementById('loginForm').onsubmit = function(e) {
        e.preventDefault();
        const storedUser = JSON.parse(localStorage.getItem('user'));
        const errorMsg = document.getElementById('loginError');
        
        attempts++;

        // المحاولة الرابعة: توليد الرقم العشوائي
        if (attempts === 4) {
            errorMsg.style.display = 'none';
            randomCode = Math.floor(1000 + Math.random() * 9000);
            document.getElementById('otpArea').style.display = 'block';
            document.getElementById('generatedCode').innerText = randomCode;
            return;
        }

        // الفشل في المحاولة الرابعة: تحويل لـ Blocked
        if (attempts > 4) {
            const userOtp = document.getElementById('otpInput').value;
            if (userOtp != randomCode) {
                window.location.href = "blocked.html";
                return;
            }
        }

        // التحقق العادي (المحاولات 1-3)
        if (storedUser && emailInput.value === storedUser.email && passInput.value === storedUser.pass) {
            alert("Login Successful!");
            window.location.href = "dashboard.html";
        } else {
            errorMsg.style.display = 'block';
            errorMsg.innerText = `⚠️ خطأ في البيانات. محاولة رقم (${attempts})`;
        }
    };
</script>
</body>
</html>
