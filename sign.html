<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SAYCO | Secure Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: #080a0c;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        #particles-js {
            position: absolute; width: 100%; height: 100%;
            top: 0; left: 0; z-index: 1;
        }

        .main-container {
            position: relative; z-index: 2;
            height: 100vh; display: flex;
            align-items: center; justify-content: center;
        }

        .auth-card {
            background: #111418;
            border-top: 4px solid #00ffc3;
            border-radius: 10px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        h2 { color: #00ffc3; font-weight: 700; text-align: center; margin-bottom: 30px; letter-spacing: 1px; }

        .form-control {
            background: #1a1f24;
            border: 1px solid #2d353c;
            color: #fff !important;
            padding: 12px;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        .form-control:enabled:hover {
            border-color: #00ffc3;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 255, 195, 0.3);
            background: #21282e;
        }

        .form-control:disabled {
            background: #0c0e10;
            border-color: #1a1f24;
            opacity: 0.4;
            cursor: not-allowed;
        }

        .form-control:focus {
            background: #1a1f24; border-color: #00ffc3;
            color: #fff; box-shadow: 0 0 8px rgba(0, 255, 195, 0.3);
            outline: none;
        }

        .pass-wrapper { position: relative; }
        .toggle-btn {
            position: absolute; left: 15px; top: 15px;
            color: #636e72; cursor: pointer; z-index: 10;
        }

        .btn-submit {
            background: #00ffc3; color: #080a0c;
            font-weight: 800; border: none; padding: 12px;
            margin-top: 20px; transition: 0.4s;
        }

        .btn-submit:enabled:hover {
            background: #00ce9d; transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 195, 0.4);
        }

        .error-hint { color: #ff4d4d; font-size: 0.8em; display: none; margin-bottom: 10px; }
        ::placeholder { color: #636e72 !important; }
    </style>
</head>
<body>

<div id="particles-js"></div>

<div class="main-container">
    <div class="auth-card">
        <h2>SAYCO SYSTEM</h2>
        <form id="regForm">
            <input type="text" id="name" class="form-control" placeholder="الاسم الكامل" required>
            <div id="nameError" class="error-hint">⚠️ يرجى إدخال اسمين (حروف فقط).</div>

            <input type="text" id="address" class="form-control" placeholder="العنوان" required disabled>
            <div id="addressError" class="error-hint">⚠️ العنوان لا يمكن أن يكون أرقاماً فقط.</div>

            <input type="text" id="country" class="form-control" placeholder="الدولة" required disabled>
            <div id="countryError" class="error-hint">⚠️ الدولة يجب أن تحتوي على حروف فقط.</div>

            <input type="email" id="email" class="form-control" placeholder="البريد الإلكتروني" required disabled>
            
            <div class="pass-wrapper">
                <input type="password" id="pass" class="form-control" placeholder="كلمة المرور (8 رموز)" required disabled>
                <i class="fa-solid fa-eye-slash toggle-btn" id="togglePass"></i>
            </div>
            <div id="passError" class="error-hint">⚠️ الرمز يجب أن يكون 8 خانات على الأقل.</div>

            <button type="submit" id="submitBtn" class="btn btn-submit w-100" disabled>إنشاء حساب مؤمن</button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
    /* أنيميشن كودك الأصلي */
    particlesJS("particles-js", {
        "particles": {
            "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
            "color": { "value": "#00ffc3" },
            "shape": { "type": "circle" },
            "opacity": { "value": 0.5, "random": false },
            "size": { "value": 3, "random": true },
            "line_linked": { "enable": true, "distance": 150, "color": "#00ffc3", "opacity": 0.4, "width": 1 },
            "move": { "enable": true, "speed": 2, "direction": "none", "random": false, "straight": false, "out_mode": "out", "bounce": false }
        },
        "interactivity": {
            "events": { "onhover": { "enable": true, "mode": "grab" }, "onclick": { "enable": true, "mode": "push" } },
            "modes": { "grab": { "distance": 140, "line_linked": { "opacity": 1 } } }
        },
        "retina_detect": true
    });

    const passInput = document.getElementById('pass');
    const togglePass = document.getElementById('togglePass');
    togglePass.addEventListener('click', () => {
        passInput.type = passInput.type === 'password' ? 'text' : 'password';
        togglePass.classList.toggle('fa-eye');
        togglePass.classList.toggle('fa-eye-slash');
    });

    const inputs = [
        document.getElementById('name'),
        document.getElementById('address'),
        document.getElementById('country'),
        document.getElementById('email'),
        passInput
    ];
    const submitBtn = document.getElementById('submitBtn');

    inputs.forEach((input, index) => {
        input.addEventListener('input', () => {
            const errorId = input.id + "Error";
            if(document.getElementById(errorId)) document.getElementById(errorId).style.display = 'none';

            if (input.value.trim().length > 0) {
                if (index + 1 < inputs.length) inputs[index + 1].disabled = false;
                else submitBtn.disabled = false;
            } else {
                for (let i = index + 1; i < inputs.length; i++) {
                    inputs[i].disabled = true;
                    inputs[i].value = "";
                }
                submitBtn.disabled = true;
            }
        });
    });

    document.getElementById('regForm').onsubmit = function(e) {
        e.preventDefault();
        const nameVal = document.getElementById('name').value.trim();
        const addrVal = document.getElementById('address').value.trim();
        const countryVal = document.getElementById('country').value.trim();
        const passVal = passInput.value.trim();

        const textOnlyRegex = /^[a-zA-Z\u0600-\u06FF\s]+$/;
        // العنوان مسموح فيه أرقام وحروف، بس ميبقاش أرقام بس
        const addrValid = isNaN(addrVal); 
        const nameValid = nameVal.split(' ').filter(n => n.length > 0).length >= 2 && textOnlyRegex.test(nameVal);
        const countryValid = textOnlyRegex.test(countryVal);
        const passValid = passVal.length >= 8;

        document.getElementById('nameError').style.display = nameValid ? 'none' : 'block';
        document.getElementById('addressError').style.display = addrValid ? 'none' : 'block';
        document.getElementById('countryError').style.display = countryValid ? 'none' : 'block';
        document.getElementById('passError').style.display = passValid ? 'none' : 'block';

        if (nameValid && addrValid && countryValid && passValid) {
            localStorage.setItem('user', JSON.stringify({ name: nameVal, email: document.getElementById('email').value, pass: passVal }));
            alert("Registration Successful!");
            window.location.href = "login.html";
        }
    };
</script>
</body>
</html>
