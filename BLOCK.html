<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SAYCO | Access Blocked</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: #080a0c;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            color: #ff4d4d;
        }

        #particles-js {
            position: absolute; width: 100%; height: 100%;
            top: 0; left: 0; z-index: 1;
        }

        .main-container {
            position: relative; z-index: 2;
            height: 100vh; display: flex;
            align-items: center; justify-content: center;
        }

        .blocked-card {
            background: rgba(17, 20, 24, 0.95);
            border: 1px solid #2d353c;
            border-top: 4px solid #ff4d4d;
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 0 50px rgba(255, 77, 77, 0.2);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .status-icon {
            font-size: 70px;
            margin-bottom: 20px;
            color: #ff4d4d;
            text-shadow: 0 0 20px rgba(255, 77, 77, 0.5);
        }

        h2 { color: #ff4d4d; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
        
        .timer-box {
            background: #000;
            border: 1px solid #333;
            padding: 25px;
            margin: 30px 0;
            border-radius: 10px;
        }

        #countdown {
            font-family: 'Courier New', monospace;
            font-size: 3.5em;
            font-weight: 900;
            color: #ff4d4d;
            text-shadow: 0 0 10px rgba(255, 77, 77, 0.5);
        }

        /* تعديل خانة الـ Logs مع إضافة السكرول */
        .system-logs {
            background: rgba(0,0,0,0.8);
            color: #00ffc3; 
            font-family: 'Courier New', monospace;
            padding: 15px;
            border-radius: 5px;
            text-align: left;
            font-size: 0.8em;
            height: 120px; /* طول ثابت */
            border-left: 2px solid #00ffc3;
            overflow-y: auto; /* تفعيل السكرول الرأسي */
            white-space: pre-line;
        }

        /* ستايل السكرول بار عشان يكون شكله شيك */
        .system-logs::-webkit-scrollbar {
            width: 5px;
        }
        .system-logs::-webkit-scrollbar-track {
            background: #000;
        }
        .system-logs::-webkit-scrollbar-thumb {
            background: #2d353c;
            border-radius: 10px;
        }
        .system-logs::-webkit-scrollbar-thumb:hover {
            background: #00ffc3;
        }

        .btn-retry {
            background: #00ffc3; color: #080a0c;
            font-weight: 800; border: none; padding: 15px 40px;
            margin-top: 25px; transition: 0.4s;
            display: none; text-decoration: none;
            border-radius: 5px;
        }

        .btn-retry:hover {
            background: #fff;
            box-shadow: 0 0 30px #00ffc3;
        }
    </style>
</head>
<body>

<div id="particles-js"></div>

<div class="main-container">
    <div class="blocked-card">
        <div class="status-icon">
            <i class="fa-solid fa-triangle-exclamation"></i>
        </div>
        
        <h2>System Lockdown</h2>
        <p style="color: #636e72;">تم تقييد الوصول بسبب محاولات فاشلة متكررة.</p>

        <div class="timer-box">
            <div id="countdown">00:00</div>
            <div style="font-size: 0.7em; color: #444; margin-top: 5px;">COOLDOWN ACTIVE</div>
        </div>

        <div class="system-logs" id="logs">> Initializing security protocols...</div>

        <a href="login.html" id="retryBtn" class="btn-retry">إعادة محاولة الدخول</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
    /* الأنيميشن الأصلي */
    particlesJS("particles-js", {
        "particles": {
            "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
            "color": { "value": "#ff4d4d" },
            "shape": { "type": "circle" },
            "opacity": { "value": 0.5 },
            "size": { "value": 3, "random": true },
            "line_linked": { "enable": true, "distance": 150, "color": "#ff4d4d", "opacity": 0.4, "width": 1 },
            "move": { "enable": true, "speed": 2 }
        }
    });

    let blockInfo = JSON.parse(localStorage.getItem('blockInfo'));
    if (!blockInfo) {
        const fakeExpiry = new Date().getTime() + (120 * 1000); 
        blockInfo = { expiry: fakeExpiry, permanent: false };
    }

    const countdownEl = document.getElementById('countdown');
    const logsEl = document.getElementById('logs');
    const retryBtn = document.getElementById('retryBtn');

    // لوجات كتير عشان السكرول يظهر قدامك
    const logsMessages = [
        "> Identifying IP source...",
        "> Hardware ID logged.",
        "> OTP verification failed 4 times.",
        "> Security level: CRITICAL.",
        "> Checking database for blacklisted accounts...",
        "> Analyzing user behavior patterns...",
        "> Firewall isolation active.",
        "> Waiting for system unlock..."
    ];

    let logIndex = 0;
    const logInterval = setInterval(() => {
        if(logIndex < logsMessages.length) {
            logsEl.innerHTML += "\n" + logsMessages[logIndex];
            logIndex++;
            // جعل السكرول ينزل لآخر سطر تلقائياً مع كل رسالة جديدة
            logsEl.scrollTop = logsEl.scrollHeight;
        } else { clearInterval(logInterval); }
    }, 1500);

    const timer = setInterval(() => {
        const now = new Date().getTime();
        const distance = blockInfo.expiry - now;
        if (distance <= 0) {
            clearInterval(timer);
            countdownEl.innerText = "00:00";
            countdownEl.style.color = "#00ffc3";
            retryBtn.style.display = "inline-block";
            return;
        }
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);
        countdownEl.innerText = (minutes < 10 ? "0" + minutes : minutes) + ":" + (seconds < 10 ? "0" + seconds : seconds);
    }, 1000);
</script>
</body>
</html>
