<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SAYCO | Reset Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: #080a0c;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        #particles-js {
            position: absolute; width: 100%; height: 100%;
            top: 0; left: 0; z-index: 1;
        }

        .main-container {
            position: relative; z-index: 2;
            height: 100vh; display: flex;
            align-items: center; justify-content: center;
        }

        .auth-card {
            background: rgba(17, 20, 24, 0.9);
            border-top: 4px solid #00ffc3;
            border-radius: 10px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            text-align: center;
        }

        h2 { color: #00ffc3; font-weight: 700; margin-bottom: 10px; }
        p { color: #636e72; font-size: 0.9em; margin-bottom: 25px; }

        .form-control {
            background: #1a1f24;
            border: 1px solid #2d353c;
            color: #fff !important;
            padding: 12px;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .form-control:focus {
            background: #1a1f24;
            border-color: #00ffc3;
            box-shadow: 0 0 10px rgba(0, 255, 195, 0.2);
            outline: none;
        }

        .btn-update {
            background: #00ffc3; color: #080a0c;
            font-weight: 800; border: none; padding: 12px;
            width: 100%; margin-top: 10px; transition: 0.4s;
        }

        .btn-update:hover {
            background: #fff;
            box-shadow: 0 0 20px rgba(0, 255, 195, 0.4);
            transform: translateY(-2px);
        }

        .error-hint { color: #ff4d4d; font-size: 0.8em; display: none; margin-bottom: 10px; text-align: right; }
        ::placeholder { color: #4b5457 !important; }
        
        .password-strength {
            height: 4px; width: 0%; 
            background: #ff4d4d; margin-top: -10px; margin-bottom: 15px;
            transition: 0.5s; border-radius: 2px;
        }
    </style>
</head>
<body>

<div id="particles-js"></div>

<div class="main-container">
    <div class="auth-card">
        <div style="font-size: 50px; color: #00ffc3; margin-bottom: 15px;">
            <i class="fa-solid fa-key"></i>
        </div>
        <h2>تعيين كلمة سر جديدة</h2>
        <p>قم بإنشاء كلمة سر قوية لحماية حسابك من الاختراق.</p>
        
        <form id="resetForm">
            <input type="password" id="newPass" class="form-control" placeholder="كلمة السر الجديدة" required>
            <div class="password-strength" id="strengthBar"></div>
            
            <input type="password" id="confirmPass" class="form-control" placeholder="تأكيد كلمة السر" required disabled>
            
            <div id="matchError" class="error-hint">⚠️ كلمات السر غير متطابقة!</div>
            <div id="lengthError" class="error-hint">⚠️ يجب أن تكون كلمة السر 6 أرقام/حروف على الأقل.</div>

            <button type="submit" id="submitBtn" class="btn btn-update" disabled>تحديث كلمة السر</button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
    /* أنيميشن الجسيمات الأصلي باللون الأخضر */
    particlesJS("particles-js", {
        "particles": {
            "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
            "color": { "value": "#00ffc3" },
            "shape": { "type": "circle" },
            "opacity": { "value": 0.5 },
            "size": { "value": 3, "random": true },
            "line_linked": { "enable": true, "distance": 150, "color": "#00ffc3", "opacity": 0.4 },
            "move": { "speed": 2 }
        }
    });

    const newPass = document.getElementById('newPass');
    const confirmPass = document.getElementById('confirmPass');
    const strengthBar = document.getElementById('strengthBar');
    const submitBtn = document.getElementById('submitBtn');

    // مراقبة قوة كلمة السر وفك قفل التأكيد
    newPass.addEventListener('input', () => {
        const val = newPass.value;
        if (val.length >= 6) {
            confirmPass.disabled = false;
            strengthBar.style.width = "100%";
            strengthBar.style.background = "#00ffc3";
            document.getElementById('lengthError').style.display = 'none';
        } else {
            confirmPass.disabled = true;
            strengthBar.style.width = val.length * 15 + "%";
            strengthBar.style.background = "#ff4d4d";
        }
    });

    // مراقبة التطابق لتفعيل الزرار
    confirmPass.addEventListener('input', () => {
        if (confirmPass.value === newPass.value && newPass.value.length >= 6) {
            submitBtn.disabled = false;
            document.getElementById('matchError').style.display = 'none';
        } else {
            submitBtn.disabled = true;
        }
    });

    document.getElementById('resetForm').onsubmit = function(e) {
        e.preventDefault();
        
        if (newPass.value.length < 6) {
            document.getElementById('lengthError').style.display = 'block';
            return;
        }

        if (newPass.value !== confirmPass.value) {
            document.getElementById('matchError').style.display = 'block';
            return;
        }

        // تحديث الباسورد في الـ localStorage
        let user = JSON.parse(localStorage.getItem('user'));
        if (user) {
            user.password = newPass.value;
            localStorage.setItem('user', JSON.stringify(user));
            
            // تصفير محاولات الفشل عشان يقدر يدخل بالجديد
            localStorage.removeItem('loginAttempts'); 
            localStorage.removeItem('blockInfo');

            alert("تم تغيير كلمة السر بنجاح! يمكنك الآن تسجيل الدخول.");
            window.location.href = "login.html";
        }
    };
</script>
</body>
</html>
